site_name: Pawel Gorzerk — Infrastructure Engineering Portfolio
site_description: Self-hosted infrastructure lab used to build and demonstrate operational engineering skills - Linux, Docker, networking, monitoring, security, and disaster recovery.
repo_url: https://github.com/Pawel-Gorzerk/homelab-docs
repo_name: Pawel-Gorzerk/homelab-docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - content.code.copy
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - tables
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - About: about.md
  - Architecture: architecture.md
  - Infrastructure: infrastructure.md
  - Networking: networking.md
  - Monitoring: monitoring.md
  - Security: security.md
  - Backup & Disaster Recovery: backup.md
  - Automation: automation.md
  - Operations: operations.md
  - Lessons Learned: lessons-learned.md
  - Roadmap: roadmap.md
  - Tech Stack Reference: stack-overview.md
